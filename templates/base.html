<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CalTrack</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'DM Mono', monospace; }
    
    /* Responsive sidebar toggle */
    @media (max-width: 768px) {
      .sidebar-open aside {
        width: 100%;
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        z-index: 40;
      }
      .sidebar-open .sidebar-overlay {
        display: block;
      }
    }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">
  {% block content %}{% endblock %}
</body>
</html>
