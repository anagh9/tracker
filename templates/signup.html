{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="mb-10 text-center">
      <span class="mono text-2xl font-medium tracking-tight text-stone-900">cal<span class="text-orange-500">track</span></span>
      <p class="text-sm text-stone-400 mt-1">daily calorie journal</p>
    </div>

    <!-- Info Message -->
    <div class="text-center space-y-4">
      <p class="text-sm text-stone-600">
        Sign up is now available only through Google Sign-In for a seamless experience.
      </p>
      
      <a href="/login" class="inline-block bg-stone-900 text-white text-sm font-medium py-2.5 px-6 rounded-lg hover:bg-stone-700 transition">
        Continue to Sign In
      </a>
    </div>
  </div>
</div>
{% endblock %}
